<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans,sans-serif);background:transparent;color:var(--color-text-primary);font-size:14px;}
.wrap{padding:.5rem 0 2rem;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;}
.shop-name{font-size:17px;font-weight:500;}
.shop-sub{font-size:12px;color:var(--color-text-secondary);margin-top:2px;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem;}
.kpi{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.85rem 1rem;}
.kpi-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;}
.kpi-val{font-size:22px;font-weight:500;}
.kpi-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;}
.section{margin-bottom:1.75rem;}
.sec-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.85rem;}
.day-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;}
.day-tab{font-size:12px;padding:4px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer;}
.day-tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary);}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:500px){.chart-row{grid-template-columns:1fr;}}
.chart-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.85rem;}
.chart-box-title{font-size:12px;color:var(--color-text-secondary);margin-bottom:.5rem;}
.chart-wrap{position:relative;height:200px;}
.pred-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
.pred-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.9rem;}
.pred-day{font-size:10px;color:var(--color-text-tertiary);margin-bottom:2px;}
.pred-session{font-size:13px;font-weight:500;margin-bottom:6px;}
.pred-val{font-size:28px;font-weight:600;color:#1D9E75;}
.pred-unit{font-size:12px;color:var(--color-text-secondary);}
.pred-basis{font-size:11px;color:var(--color-text-tertiary);margin-top:5px;}
.trend-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;margin-top:6px;}
.up{background:#EAF3DE;color:#3B6D11;} .dn{background:#FCEBEB;color:#A32D2D;} .fl{background:#F1EFE8;color:#5F5E5A;}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--color-text-secondary);margin-bottom:6px;}
.legend span{display:flex;align-items:center;gap:4px;}
.leg-sq{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.heatmap-grid{display:grid;grid-template-columns:60px repeat(6,1fr);gap:3px;font-size:11px;}
.hm-head{text-align:center;color:var(--color-text-secondary);padding:3px 0;font-size:10px;font-weight:500;}
.hm-label{color:var(--color-text-secondary);display:flex;align-items:center;font-size:10px;}
.hm-cell{border-radius:4px;padding:6px 2px;text-align:center;font-size:12px;font-weight:500;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>


const SHEET_URL = "https://script.google.com/macros/s/AKfycbwBc0TLD9oz3rbRzVZP_5qg0p307Zb2ZRLR4hUuqjrsTsoAQoJv-J-GGKbSL6xWuvVf/exec";
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let data=[], charts={}, activeDay=2;

async function fetchData(){
  const res = await fetch(SHEET_URL);
  const json = await res.json();
  if(json.status !== "ok") throw new Error(json.message || "Sheet error");
  data = json.data.map(r=>({
    ...r,
    date: new Date(r.date),
    dow: new Date(r.date).getDay()
  })).filter(r=>r.demand>0);
}

function parseData(){ /* data loaded via fetchData() */ }

function getLastN(dayIdx,session,n=10){
  return data.filter(r=>r.dow===dayIdx&&r.session===session)
    .sort((a,b)=>b.date-a.date).slice(0,n).reverse();
}

// Prediction: avg of last 4 same-weekday sessions, rounded to whole KG
function predict(dayIdx,session){
  const h=data.filter(r=>r.dow===dayIdx&&r.session===session)
    .sort((a,b)=>b.date-a.date).slice(0,4);
  if(!h.length) return null;
  const avg=h.reduce((s,r)=>s+r.demand,0)/h.length;
  const pred=Math.round(avg);
  const trend=h.length>=2?(h[0].demand-h[h.length-1].demand):0;
  return{pred,count:h.length,trend,last4:h.map(r=>r.demand)};
}

function getKPIs(){
  const sorted=[...data].sort((a,b)=>b.date-a.date);
  const latest=sorted[0]?.date;
  const latestDay=sorted.filter(r=>r.date.toDateString()===latest?.toDateString());
  const latestKg=latestDay.reduce((s,r)=>s+r.demand,0);
  const week7=new Date(latest); week7.setDate(week7.getDate()-7);
  const wKg=data.filter(r=>r.date>=week7).reduce((s,r)=>s+r.demand,0);
  const avgDem=data.reduce((s,r)=>s+r.demand,0)/data.length;
  const dateStr=latest?.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})||'—';
  return{latestKg,wKg,avgDem:Math.round(avgDem),dateStr,total:data.length};
}

function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

function renderTrendChart(canvasId,records){
  destroyChart(canvasId);
  const ctx=document.getElementById(canvasId);
  if(!ctx) return;
  const labels=records.map(r=>r.date.toLocaleDateString('en-IN',{day:'numeric',month:'short'}));
  const prodKg=records.map(r=>r.chicken+r.mutton);
  const demKg=records.map(r=>r.demand);
  charts[canvasId]=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[
      {label:'Production KG',data:prodKg,backgroundColor:'rgba(55,138,221,0.75)',borderRadius:4},
      {label:'Demand KG',data:demKg,backgroundColor:'rgba(29,158,117,0.75)',borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'top',labels:{font:{size:10},boxWidth:10,padding:8}}},
      scales:{
        x:{ticks:{font:{size:9},maxRotation:45,autoSkip:false},grid:{display:false}},
        y:{ticks:{font:{size:10},callback:v=>v+'kg',stepSize:1},grid:{color:'rgba(128,128,128,0.08)'},min:0}
      }}
  });
}

function renderDaySection(dayIdx){
  const container=document.getElementById('trend-charts');
  if(!container) return;
  container.innerHTML='';
  ['Lunch','Dinner'].forEach((sess,i)=>{
    const records=getLastN(dayIdx,sess,10);
    if(!records.length) return;
    const box=document.createElement('div');
    box.className='chart-box';
    box.innerHTML=`<div class="chart-box-title">Last ${records.length} ${SHORT[dayIdx]}s — ${sess}</div><div class="chart-wrap"><canvas id="tc-${dayIdx}-${i}"></canvas></div>`;
    container.appendChild(box);
    setTimeout(()=>renderTrendChart(`tc-${dayIdx}-${i}`,records),0);
  });
  if(!container.children.length) container.innerHTML='<p style="color:var(--color-text-secondary);font-size:13px;">No data for this day.</p>';
}

function renderPredictions(){
  const today=new Date();
  const todayDow=today.getDay();
  const tmrDow=(todayDow+1)%7;
  const container=document.getElementById('pred-grid');
  if(!container) return;
  container.innerHTML='';
  [[todayDow,'Today'],[tmrDow,'Tomorrow']].forEach(([dayIdx,label])=>{
    if(dayIdx===1) return; // Monday closed
    ['Lunch','Dinner'].forEach(sess=>{
      const p=predict(dayIdx,sess);
      if(!p) return;
      const tDir=p.trend>1?'↑ Higher recently':p.trend<-1?'↓ Lower recently':'→ Stable';
      const tCls=p.trend>1?'up':p.trend<-1?'dn':'fl';
      const last4Str=p.last4.slice().reverse().join(', ')+'kg';
      const card=document.createElement('div');
      card.className='pred-card';
      card.innerHTML=`
        <div class="pred-day">${label} · ${DAYS[dayIdx]}</div>
        <div class="pred-session">${sess}</div>
        <div class="pred-val">${p.pred} KG</div>
        <div class="pred-unit">Prepare ${p.pred} KG</div>
        <div class="pred-basis">Last ${p.count} sessions: ${last4Str}</div>
        <span class="trend-badge ${tCls}">${tDir}</span>`;
      container.appendChild(card);
    });
  });
}

function renderHeatmap(){
  const dayIdxs=[0,2,3,4,5,6];
  const container=document.getElementById('heatmap-wrap');
  if(!container) return;
  const avgs={};
  let maxVal=0;
  dayIdxs.forEach(d=>['Lunch','Dinner'].forEach(s=>{
    const h=data.filter(r=>r.dow===d&&r.session===s);
    const avg=h.length?h.reduce((a,r)=>a+r.demand,0)/h.length:0;
    avgs[`${d}-${s}`]=Math.round(avg);
    if(avg>maxVal) maxVal=avg;
  }));
  const colors=['#E1F5EE','#9FE1CB','#5DCAA5','#1D9E75','#0F6E56'];
  const txtColors=['#085041','#085041','#085041','#fff','#fff'];
  function getColor(v){if(!v||!maxVal)return'var(--color-background-secondary)';return colors[Math.min(4,Math.floor((v/maxVal)*5))];}
  function getTxtColor(v){if(!v||!maxVal)return'var(--color-text-tertiary)';return txtColors[Math.min(4,Math.floor((v/maxVal)*5))];}
  let html='<div class="heatmap-grid">';
  html+='<div class="hm-head"></div>';
  dayIdxs.forEach(d=>{html+=`<div class="hm-head">${SHORT[d]}</div>`;});
  ['Lunch','Dinner'].forEach(s=>{
    html+=`<div class="hm-label">${s}</div>`;
    dayIdxs.forEach(d=>{
      const v=avgs[`${d}-${s}`]||0;
      html+=`<div class="hm-cell" style="background:${getColor(v)};color:${getTxtColor(v)};">${v?v+'kg':'—'}</div>`;
    });
  });
  html+='</div>';
  container.innerHTML=html;
}

function renderDayTabs(){
  const activeDays=[...new Set(data.map(r=>r.dow))].filter(d=>d!==1).sort((a,b)=>a-b);
  const el=document.getElementById('day-tabs');
  if(!el) return;
  el.innerHTML='';
  activeDays.forEach(d=>{
    const btn=document.createElement('button');
    btn.className='day-tab'+(activeDay===d?' active':'');
    btn.textContent=SHORT[d];
    btn.onclick=()=>{
      activeDay=d;
      document.querySelectorAll('.day-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderDaySection(d);
    };
    el.appendChild(btn);
  });
}

function buildUI(){
  const k=getKPIs();
  document.getElementById('app').innerHTML=`
<div class="wrap">
<div class="top-bar">
  <div><div class="shop-name">🍛 Alangudi Aachi Biriyani</div><div class="shop-sub">Production Dashboard · Latest: ${k.dateStr} · ${k.total} sessions</div></div>
</div>
<div class="kpi-grid">
  <div class="kpi"><div class="kpi-label">Latest day demand</div><div class="kpi-val">${k.latestKg} KG</div><div class="kpi-sub">${k.dateStr}</div></div>
  <div class="kpi"><div class="kpi-label">Last 7 days demand</div><div class="kpi-val">${k.wKg} KG</div><div class="kpi-sub">rolling 7 days</div></div>
  <div class="kpi"><div class="kpi-label">Avg demand / session</div><div class="kpi-val">${k.avgDem} KG</div><div class="kpi-sub">all time</div></div>
</div>
<div class="section">
  <div class="sec-title">📦 Suggested preparation — today & tomorrow</div>
  <div class="pred-grid" id="pred-grid"></div>
</div>
<div class="section">
  <div class="sec-title">📈 Day-of-week trends · last 10 sessions</div>
  <div class="day-tabs" id="day-tabs"></div>
  <div class="chart-row" id="trend-charts"></div>
</div>
<div class="section">
  <div class="sec-title">🗓 Avg demand heatmap (KG)</div>
  <div id="heatmap-wrap"></div>
</div>
</div>`;
  renderDayTabs();
  renderDaySection(activeDay);
  renderPredictions();
  renderHeatmap();
}

async function init(){
  document.getElementById('app').innerHTML=`<div style="padding:3rem;text-align:center;color:var(--color-text-secondary);font-size:14px;">⏳ Loading live data from sheet...</div>`;
  try{
    await fetchData();
    buildUI();
  } catch(err){
    document.getElementById('app').innerHTML=`<div style="padding:2rem;text-align:center;color:#A32D2D;font-size:13px;">❌ Could not load sheet data.<br><small>${err.message}</small></div>`;
  }
}

init();
</script>
</body>
</html>
